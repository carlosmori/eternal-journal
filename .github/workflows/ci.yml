name: CI

on:
  pull_request:
    branches: [main]

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-${{ runner.os }}-

      - name: Install
        run: yarn install --immutable

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}

      - name: Lint Web
        run: yarn lint
        working-directory: apps/web

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Typecheck API
        run: npx tsc --noEmit
        working-directory: apps/api

      - name: Typecheck Web
        run: npx tsc --noEmit
        working-directory: apps/web

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: nextjs-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-

      - name: Build
        run: yarn build

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Run API tests
        run: yarn test
        working-directory: apps/api

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/api/node_modules
            apps/web/node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('yarn.lock') }}-${{ github.sha }}

      - name: Run Web tests
        run: yarn test
        working-directory: apps/web

  test-contracts:
    name: Test Contracts
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install contract dependencies
        run: npm ci
        working-directory: contracts

      - name: Run contract tests
        run: npm test
        working-directory: contracts

name: Deploy API to Production

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Image tag to deploy (commit SHA from staging deploy)'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: eternal-journal

permissions:
  id-token: write
  contents: read

jobs:
  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check for Prisma changes
        id: prisma-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            prisma:
              - 'apps/api/prisma/**'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Prisma migrate via ECS task (production)
        if: steps.prisma-changes.outputs.prisma == 'true'
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition eternal-journal-api-prod \
            --launch-type FARGATE \
            --network-configuration 'awsvpcConfiguration={subnets=[subnet-07239a493147ead88,subnet-0d3c67db03cf3f9bb],securityGroups=[sg-05df2090470173161],assignPublicIp=ENABLED}' \
            --overrides '{
              "containerOverrides": [{
                "name": "api",
                "command": ["npx", "prisma", "migrate", "deploy"]
              }]
            }' \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migration completed successfully"

      - name: Re-tag API image for prod
        run: |
          docker pull ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ inputs.image-tag }}
          docker tag \
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ inputs.image-tag }} \
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:prod-${{ inputs.image-tag }}
          docker push ${{ env.ECR_REGISTRY }}/eternal-journal-api:prod-${{ inputs.image-tag }}

      - name: Update API prod service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service api-service \
            --force-new-deployment

      - name: Wait for API prod stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services api-service

      - name: Smoke test production
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "${{ secrets.PROD_ALB_URL }}/health" | grep -o '"status":"ok"' || true)
            if [ -n "$STATUS" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Production health check failed after 5 attempts"
          exit 1

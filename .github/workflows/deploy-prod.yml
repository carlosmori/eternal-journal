name: Deploy API to Production

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Image tag to deploy (commit SHA from staging deploy)'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: eternal-journal

permissions:
  id-token: write
  contents: read

jobs:
  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Check for Prisma changes
        id: prisma-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            prisma:
              - 'apps/api/prisma/**'

      - name: Setup Node.js
        if: steps.prisma-changes.outputs.prisma == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.prisma-changes.outputs.prisma == 'true'
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Prisma migrate deploy (production)
        if: steps.prisma-changes.outputs.prisma == 'true'
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Re-tag API image for prod
        run: |
          docker pull ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ inputs.image-tag }}
          docker tag \
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ inputs.image-tag }} \
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:prod-${{ inputs.image-tag }}
          docker push ${{ env.ECR_REGISTRY }}/eternal-journal-api:prod-${{ inputs.image-tag }}

      - name: Update API prod service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service api-service \
            --force-new-deployment

      - name: Wait for API prod stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services api-service

      - name: Smoke test production
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "${{ secrets.PROD_ALB_URL }}/health" | grep -o '"status":"ok"' || true)
            if [ -n "$STATUS" ]; then
              echo "Production health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Production health check failed after 5 attempts"
          exit 1

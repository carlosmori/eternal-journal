name: Deploy API to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: eternal-journal

permissions:
  id-token: write
  contents: read

jobs:
  # # ─── CI: lint, format, test ───
  # ci:
  #   name: CI checks
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: 20
  #
  #     - name: Enable Corepack
  #       run: corepack enable
  #
  #     - name: Install dependencies
  #       run: yarn install --immutable
  #
  #     - name: Generate Prisma client
  #       run: yarn workspace api prisma:generate
  #
  #     - name: Check formatting
  #       run: yarn format:check
  #
  #     - name: Lint API
  #       run: yarn workspace api lint
  #
  #     - name: API tests with coverage
  #       run: cd apps/api && npx jest --coverage

  # ─── Build and push API image ───
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ github.sha }}
          tags: |
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:latest
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:stg

  # ─── Staging: migrate + deploy ───
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-api
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Check for Prisma changes
        id: prisma-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            prisma:
              - 'apps/api/prisma/**'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Prisma migrate via ECS task (staging)
        if: steps.prisma-changes.outputs.prisma == 'true'
        run: |
          TASK_ARN=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition eternal-journal-api-stg \
            --launch-type FARGATE \
            --network-configuration 'awsvpcConfiguration={subnets=[subnet-07239a493147ead88,subnet-0d3c67db03cf3f9bb],securityGroups=[sg-05df2090470173161],assignPublicIp=ENABLED}' \
            --overrides '{
              "containerOverrides": [{
                "name": "api",
                "command": ["npx", "prisma", "migrate", "deploy"]
              }]
            }' \
            --query 'tasks[0].taskArn' --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster ${{ env.ECS_CLUSTER }} --tasks $TASK_ARN \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi
          echo "Migration completed successfully"

      - name: Update API staging service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service api-service-stg \
            --force-new-deployment

      - name: Wait for API staging stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services api-service-stg

      - name: Wait for ALB health check
        run: sleep 15

      - name: Smoke test staging
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "${{ secrets.STAGING_ALB_URL }}/health" | grep -o '"status":"ok"' || true)
            if [ -n "$STATUS" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Staging health check failed after 5 attempts"
          exit 1

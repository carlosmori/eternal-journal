name: Deploy to AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: eternal-journal

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Prisma migrate (only when schema changes) ───
  migrate:
    name: Run Prisma migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Prisma changes
        id: prisma-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            prisma:
              - 'apps/api/prisma/**'

      - name: Setup Node.js
        if: steps.prisma-changes.outputs.prisma == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.prisma-changes.outputs.prisma == 'true'
        run: |
          corepack enable
          yarn install --frozen-lockfile
        working-directory: .

      - name: Configure AWS credentials
        if: steps.prisma-changes.outputs.prisma == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get DATABASE_URL from Secrets Manager
        if: steps.prisma-changes.outputs.prisma == 'true'
        id: db-secret
        run: |
          DB_URL=$(aws secretsmanager get-secret-value \
            --secret-id eternal-journal/database-url \
            --query SecretString --output text)
          echo "::add-mask::$DB_URL"
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV

      - name: Run Prisma migrate deploy
        if: steps.prisma-changes.outputs.prisma == 'true'
        run: npx prisma migrate deploy
        working-directory: apps/api

  # ─── Build and push API image ───
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    needs: migrate
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:latest

  # ─── Build and push Web image ───
  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    needs: migrate
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_STG }}
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
            NEXT_PUBLIC_ADMIN_EMAIL=${{ secrets.NEXT_PUBLIC_ADMIN_EMAIL }}
          tags: |
            ${{ env.ECR_REGISTRY }}/eternal-journal-web:staging-${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/eternal-journal-web:latest

  # ─── Deploy to staging ───
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-api, build-web]
    environment: staging
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update API staging service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service api-service-stg \
            --force-new-deployment

      - name: Update Web staging service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service web-service-stg \
            --force-new-deployment

      - name: Wait for API staging stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services api-service-stg

      - name: Wait for Web staging stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services web-service-stg

  # ─── Deploy to production (manual approval) ───
  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Re-tag images for prod
        run: |
          # Pull staging images and re-tag for prod
          docker pull ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ needs.deploy-staging.outputs.image-tag || github.sha }}

          # Re-build web with prod API URL
          docker build \
            --file apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }} \
            --build-arg NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }} \
            --build-arg NEXT_PUBLIC_ADMIN_EMAIL=${{ secrets.NEXT_PUBLIC_ADMIN_EMAIL }} \
            --tag ${{ env.ECR_REGISTRY }}/eternal-journal-web:prod-${{ github.sha }} \
            .

          # Tag API for prod
          docker tag \
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ github.sha }} \
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:prod-${{ github.sha }}

          # Push prod tags
          docker push ${{ env.ECR_REGISTRY }}/eternal-journal-api:prod-${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/eternal-journal-web:prod-${{ github.sha }}

      - name: Update API prod service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service api-service \
            --force-new-deployment

      - name: Update Web prod service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service web-service \
            --force-new-deployment

      - name: Wait for API prod stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services api-service

      - name: Wait for Web prod stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services web-service

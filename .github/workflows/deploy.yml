name: Deploy API to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: eternal-journal

permissions:
  id-token: write
  contents: read

jobs:
  # ─── Build and push API image ───
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          build-args: |
            APP_VERSION=${{ github.sha }}
          tags: |
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:${{ steps.meta.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:latest
            ${{ env.ECR_REGISTRY }}/eternal-journal-api:stg

  # ─── Staging: migrate + deploy ───
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-api
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Check for Prisma changes
        id: prisma-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            prisma:
              - 'apps/api/prisma/**'

      - name: Setup Node.js
        if: steps.prisma-changes.outputs.prisma == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.prisma-changes.outputs.prisma == 'true'
        run: |
          corepack enable
          yarn install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Prisma migrate deploy (staging)
        if: steps.prisma-changes.outputs.prisma == 'true'
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Update API staging service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service api-service-stg \
            --force-new-deployment

      - name: Wait for API staging stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services api-service-stg

      - name: Wait for ALB health check
        run: sleep 15

      - name: Smoke test staging
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "${{ secrets.STAGING_ALB_URL }}/health" | grep -o '"status":"ok"' || true)
            if [ -n "$STATUS" ]; then
              echo "Staging health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Staging health check failed after 5 attempts"
          exit 1

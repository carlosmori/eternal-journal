version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare yarn@4.9.2 --activate
            - cd ../.. && yarn install --immutable
        build:
          commands:
            - env | grep -e NEXT_PUBLIC_ >> .env.production
            - env | grep -e BACKEND_URL >> .env.production
            - yarn build
            - cp .env.production "$(dirname "$(find .next/standalone -name server.js -maxdepth 3 | head -1)")"/.env.production
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - ../../apps/web/node_modules/**/*
          - .next/cache/**/*
